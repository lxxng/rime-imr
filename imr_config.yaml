speller:
  algebra:
    声调:
      - xform/ü/v/
      - xform/(^|')([a-z]+)(?=$|')/${1}${2}<5>/
      - xform/ā([a-z]*)(?=$|')/a${1}<1>/
      - xform/á([a-z]*)(?=$|')/a${1}<2>/
      - xform/ǎ([a-z]*)(?=$|')/a${1}<3>/
      - xform/à([a-z]*)(?=$|')/a${1}<4>/
      - xform/ō([a-z]*)(?=$|')/o${1}<1>/
      - xform/ó([a-z]*)(?=$|')/o${1}<2>/
      - xform/ǒ([a-z]*)(?=$|')/o${1}<3>/
      - xform/ò([a-z]*)(?=$|')/o${1}<4>/
      - xform/ē([a-z]*)(?=$|')/e${1}<1>/
      - xform/é([a-z]*)(?=$|')/e${1}<2>/
      - xform/ě([a-z]*)(?=$|')/e${1}<3>/
      - xform/è([a-z]*)(?=$|')/e${1}<4>/
      - xform/ī([a-z]*)(?=$|')/i${1}<1>/
      - xform/í([a-z]*)(?=$|')/i${1}<2>/
      - xform/ǐ([a-z]*)(?=$|')/i${1}<3>/
      - xform/ì([a-z]*)(?=$|')/i${1}<4>/
      - xform/ū([a-z]*)(?=$|')/u${1}<1>/
      - xform/ú([a-z]*)(?=$|')/u${1}<2>/
      - xform/ǔ([a-z]*)(?=$|')/u${1}<3>/
      - xform/ù([a-z]*)(?=$|')/u${1}<4>/
      - xform/ǖ([a-z]*)(?=$|')/v${1}<1>/
      - xform/ǘ([a-z]*)(?=$|')/v${1}<2>/
      - xform/ǚ([a-z]*)(?=$|')/v${1}<3>/
      - xform/ǜ([a-z]*)(?=$|')/v${1}<4>/
      - xform/ń([a-z]*)(?=$|')/n${1}<2>/
      - xform/ň([a-z]*)(?=$|')/n${1}<3>/
      - xform/ǹ([a-z]*)(?=$|')/n${1}<4>/
      - xform/ḿ([a-z]*)(?=$|')/m${1}<2>/
      - xform/m̀([a-z]*)(?=$|')/m${1}<4>/

      # 万象拼音的 m n 特殊拼音处理
      - derive/(^|')ng(?=$|['<])/${1}eng/
      - xform/(^|')n(?=$|['<])/${1}en/
      - xform/(^|')m(?=$|['<])/${1}me/
    自然码: # 全拼转自然码
      - derive/(^|')([jqxy])u(?=^|$|'|(<[1-5]>))/${1}${2}v/
      - derive/(^|')([aoe])([ioun])(?=^|$|'|(<[1-5]>))/${1}${2}${2}${3}/
      - xform/(^|')([aoe])(ng)?(?=^|$|'|(<[1-5]>))/${1}${2}${2}${3}/
      - xform/iu(?=^|$|'|(<[1-5]>))/<q>/
      - xform/[iu]a(?=^|$|'|(<[1-5]>))/<w>/
      - xform/[uv]an(?=^|$|'|(<[1-5]>))/<r>/
      - xform/[uv]e(?=^|$|'|(<[1-5]>))/<t>/
      - xform/(ing|uai)(?=^|$|'|(<[1-5]>))/<y>/
      - xform/(^|')sh/${1}<u>/
      - xform/(^|')ch/${1}<i>/
      - xform/(^|')zh/${1}<v>/
      - xform/uo(?=^|$|'|(<[1-5]>))/<o>/
      - xform/[uv]n(?=^|$|'|(<[1-5]>))/<p>/
      - xform/([a-z>])i?ong(?=^|$|'|(<[1-5]>))/$1<s>/
      - xform/[iu]ang(?=^|$|'|(<[1-5]>))/<d>/
      - xform/([a-z>])en(?=^|$|'|(<[1-5]>))/$1<f>/
      - xform/([a-z>])eng(?=^|$|'|(<[1-5]>))/$1<g>/
      - xform/([a-z>])ang(?=^|$|'|(<[1-5]>))/$1<h>/
      - xform/ian(?=^|$|'|(<[1-5]>))/<m>/
      - xform/([a-z>])an(?=^|$|'|(<[1-5]>))/$1<j>/
      - xform/iao(?=^|$|'|(<[1-5]>))/<c>/
      - xform/([a-z>])ao(?=^|$|'|(<[1-5]>))/$1<k>/
      - xform/([a-z>])ai(?=^|$|'|(<[1-5]>))/$1<l>/
      - xform/([a-z>])ei(?=^|$|'|(<[1-5]>))/$1<z>/
      - xform/ie(?=^|$|'|(<[1-5]>))/<x>/
      - xform/ui(?=^|$|'|(<[1-5]>))/<v>/
      - xform/([a-z>])ou(?=^|$|'|(<[1-5]>))/$1<b>/
      - xform/in(?=^|$|'|(<[1-5]>))/<n>/

      - xform/<([a-z])>/$1/
    九宫格:
      # |by*|kvc|qso|
      # |fnz|pix|gte|
      # |jml|ruw|hda|
      - xform/b/<11>/
      - xform/y/<12>/
      - xform/k/<21>/
      - xform/v/<22>/
      - xform/c/<23>/
      - xform/q/<31>/
      - xform/s/<32>/
      - xform/o/<33>/
      - xform/f/<41>/
      - xform/n/<42>/
      - xform/z/<43>/
      - xform/p/<51>/
      - xform/i/<52>/
      - xform/x/<53>/
      - xform/g/<61>/
      - xform/t/<62>/
      - xform/e/<63>/
      - xform/j/<71>/
      - xform/m/<72>/
      - xform/l/<73>/
      - xform/r/<81>/
      - xform/u/<82>/
      - xform/w/<83>/
      - xform/h/<91>/
      - xform/d/<92>/
      - xform/a/<93>/

      - xform/<[1-9]1><[1-9]1>/${0}1/
      - xform/<[1-9]1><[1-9]2>/${0}2/
      - xform/<[1-9]1><[1-9]3>/${0}3/
      - xform/<[1-9]2><[1-9]1>/${0}4/
      - xform/<[1-9]2><[1-9]2>/${0}5/
      - xform/<[1-9]2><[1-9]3>/${0}6/
      - xform/<[1-9]3><[1-9]1>/${0}7/
      - xform/<[1-9]3><[1-9]2>/${0}8/
      - xform/<[1-9]3><[1-9]3>/${0}9/
      - xform/<([1-9])[1-3]>/${1}/
    imr_double:
      __include: speller/algebra/声调
      __append:
        __include: speller/algebra/自然码
        __append:
          - derive/^(..)<[1-5]>$/$1/
          - derive/^(.).+(<[1-5]>)$/$1$2/
          - xform/<1>/7/
          - xform/<2>/8/
          - xform/<3>/9/
          - xform/<4>/0/
          - xform/<5>/00/
    imr_t93:
      __include: speller/algebra/声调
      __append:
        __include: speller/algebra/自然码
        __append:
          __include: speller/algebra/九宫格
          __append:
            # 允许 N00
            - derive/^([1-9])[1-9]{2}(?=$|(<[1-5]>))/${1}00/
            # 允许 NN0
            - derive/^([1-9][1-9])[1-9](?=$|(<[1-5]>))/${1}0/
            - derive/^(...)<[1-5]>$/$1/
            # - derive/^(..).+(<[1-5]>)$/$1$2/ # 补零后不存在 不补零需要添加
            # - derive/^(.).+(<[1-5]>)$/$1$2/  # 补零后不存在 不补零需要添加
            - xform/<1>/a/
            - xform/<2>/b/
            - xform/<3>/c/
            - xform/<4>/d/
            - xform/<5>/e/
    radical_double:
      __include: speller/algebra/自然码
      __append: # 去掉分隔符
        - xform/'//
    radical_t93:
      __include: speller/algebra/自然码
      __append:
        __include: speller/algebra/九宫格
        __append:
          - xform/'//
translator:
  preedit_format:
    imr_t93:
      - xform/a/<1>/
      - xform/b/<2>/
      - xform/c/<3>/
      - xform/d/<4>/
      - xform/e/<5>/

      # 第三键
      - xform/(^|[ '])([1-9])([1-9])1/${1}<${2}1><${3}1>/
      - xform/(^|[ '])([1-9])([1-9])2/${1}<${2}1><${3}2>/
      - xform/(^|[ '])([1-9])([1-9])3/${1}<${2}1><${3}3>/
      - xform/(^|[ '])([1-9])([1-9])4/${1}<${2}2><${3}1>/
      - xform/(^|[ '])([1-9])([1-9])5/${1}<${2}2><${3}2>/
      - xform/(^|[ '])([1-9])([1-9])6/${1}<${2}2><${3}3>/
      - xform/(^|[ '])([1-9])([1-9])7/${1}<${2}3><${3}1>/
      - xform/(^|[ '])([1-9])([1-9])8/${1}<${2}3><${3}2>/
      - xform/(^|[ '])([1-9])([1-9])9/${1}<${2}3><${3}3>/
      # 九宫格数字映射
      # |by*|kvc|qso|
      # |fnz|pix|gte|
      # |jml|ruw|hda|
      - xform/<11>/b/
      - xform/<12>/y/
      - xform/<21>/k/
      - xform/<22>/v/
      - xform/<23>/c/
      - xform/<31>/q/
      - xform/<32>/s/
      - xform/<33>/o/
      - xform/<41>/f/
      - xform/<42>/n/
      - xform/<43>/z/
      - xform/<51>/p/
      - xform/<52>/i/
      - xform/<53>/x/
      - xform/<61>/g/
      - xform/<62>/t/
      - xform/<63>/e/
      - xform/<71>/j/
      - xform/<72>/m/
      - xform/<73>/l/
      - xform/<81>/r/
      - xform/<82>/u/
      - xform/<83>/w/
      - xform/<91>/h/
      - xform/<92>/d/
      - xform/<93>/a/

      # 自然码双拼
      - xform/(^|[ '])aa/${1}a/
      - xform/(^|[ '])ee/${1}e/
      - xform/(^|[ '])oo/${1}o/
      - xform/([bpmnljqxy])n/${1}in/
      - xform/(\w)g/${1}eng/
      - xform/(\w)q/${1}iu/
      - xform/([gkhvuirzcs])w/${1}ua/
      - xform/(\w)w/${1}ia/
      - xform/([dtnlgkhjqxyvuirzcs])r/${1}uan/
      - xform/(\w)t/${1}ve/
      - xform/([gkhvuirzcs])y/${1}uai/
      - xform/(\w)y/${1}ing/
      - xform/([dtnlgkhvuirzcs])o/${1}uo/
      - xform/(\w)p/${1}un/
      - xform/([jqx])s/${1}iong/
      - xform/(\w)s/${1}ong/
      - xform/([jqxnlb])d/${1}iang/
      - xform/(\w)d/${1}uang/
      - xform/(\w)f/${1}en/
      - xform/(\w)h/${1}ang/
      - xform/(\w)j/${1}an/
      - xform/(\w)k/${1}ao/
      - xform/(\w)l/${1}ai/
      - xform/(\w)z/${1}ei/
      - xform/(\w)x/${1}ie/
      - xform/(\w)c/${1}iao/
      - xform/([dtgkhvuirzcs])v/${1}ui/
      - xform/(\w)b/${1}ou/
      - xform/(\w)m/${1}ian/
      - xform/([aoe])\1(\w)/${1}${2}/
      - xform/(^|[ '])v/${1}zh/
      - xform/(^|[ '])i/${1}ch/
      - xform/(^|[ '])u/${1}sh/
      - xform/([jqxy])v/${1}u/
      - xform/([nl])v/${1}ü/
      - xform/ü/v/  # ü 显示为 v
      - xform/(?<=[A-Z])\s(?=[A-Z])//  # 消除大写字母之间的空格
      
      - xform/a(\w)?<1>/ā${1}/
      - xform/a(\w)?<2>/á${1}/
      - xform/a(\w)?<3>/ǎ${1}/
      - xform/a(\w)?<4>/à${1}/

      - xform/e(\w)?<1>/ē${1}/
      - xform/e(\w)?<2>/é${1}/
      - xform/e(\w)?<3>/ě${1}/
      - xform/e(\w)?<4>/è${1}/
    
      - xform/iu<1>/iū/
      - xform/iu<2>/iú/
      - xform/iu<3>/iǔ/
      - xform/iu<4>/iù/

      - xform/i(\w)?<1>/ī${1}/
      - xform/i(\w)?<2>/í${1}/
      - xform/i(\w)?<3>/ǐ${1}/
      - xform/i(\w)?<4>/ì${1}/

      - xform/o(\w)?<1>/ō${1}/
      - xform/o(\w)?<2>/ó${1}/
      - xform/o(\w)?<3>/ǒ${1}/
      - xform/o(\w)?<4>/ò${1}/

      - xform/u(\w)?<1>/ū${1}/
      - xform/u(\w)?<2>/ú${1}/
      - xform/u(\w)?<3>/ǔ${1}/
      - xform/u(\w)?<4>/ù${1}/

      - xform/ü(\w)?<1>/ǖ${1}/
      - xform/ü(\w)?<2>/ǘ${1}/
      - xform/ü(\w)?<3>/ǚ${1}/
      - xform/ü(\w)?<4>/ǜ${1}/
      
      - xform/<1>/¹/
      - xform/<2>/²/
      - xform/<3>/³/
      - xform/<4>/⁴/
      - xform/<5>/⁰/
pin_cand_filter:
  imr_double: 
    # de
    - d	的
    - de	的 地 得
    # ta
    - ta	他 她 它
  imr_t93:
    # de
    - 6	的
    - 66	的
    - 666	的 地 得
    # ta
    - 851	他 她 它

octagram: # 语言模型
  wanxiang: # 万象
    grammar:
      language: wanxiang-lts-zh-hans
      collocation_max_length: 8
      collocation_min_length: 3
      collocation_penalty: -10
      non_collocation_penalty: -5
      weak_collocation_penalty: -100
      rear_penalty: -5
    translator/contextual_suggestions: false
    translator/max_homophones: 8
    translator/max_homographs: 8

