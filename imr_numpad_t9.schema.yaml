schema:
  schema_id: imr_numpad_t9
  name: IMR-小键盘九键
  version: alpha
  description: |
    PC小键盘九键输入方案
  dependencies:
    - imr_numpad_t9_radical_pinyin
    - imr_numpad_t9_reverse_pinyin

engine:
  processors:
    - lua_processor@*imr.numpad*Processor
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@radical_lookup  # 部件拆字自定义 tag
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - table_translator@radical_lookup    # 部件拆字反查
    - lua_translator@*force_gc           # 暴力 GC
  filters:
    - reverse_lookup_filter@radical_reverse_lookup  # 部件拆字滤镜
    - uniquifier # 去重


# 处理符合特定规则的输入码，如网址、反查
recognizer:
  import_preset: default                # 从 default.yaml 继承通用的
  patterns:                             # 再增加方案专有的：
    radical_lookup: "^77[1-9]+$"        # 响应部件拆字的反查，触发前缀与 radical_lookup/prefix 匹配

translator:
  prism: imr_numpad_t9
  dictionary: wanxiang
  enable_word_completion: true # 大于 4 音节的词条自动补全，librime > 1.11.2
  spelling_hints: 8            # corrector.lua ：为了让错音错字提示的 Lua 同时适配全拼双拼，将拼音显示在 comment 中
  always_show_comments: true   # corrector.lua ：Rime 默认在 preedit 等于 comment 时取消显示 comment，这里强制一直显示，供 corrector.lua 做判断用。
  initial_quality: 1.2         # 拼音的权重应该比英文大
  preedit_format:              # preedit_format 影响到输入框的显示和“Shift+回车”上屏的字符
    - xform/7/'/
    - xform/([12345689])q/${1}¹/
    - xform/([12345689])w/${1}²/
    - xform/([12345689])e/${1}³/
    - xform/([12345689])r/${1}⁴/
    - xform/([12345689])t/${1}⁰/
    - xform/a([a-z]*)1'/ā${1}'/
    - xform/a([a-z]*)2'/á${1}'/
    - xform/a([a-z]*)3'/ǎ${1}'/
    - xform/a([a-z]*)4'/à${1}'/

    - xform/e([a-z]*)1'/ē${1}'/
    - xform/e([a-z]*)2'/é${1}'/
    - xform/e([a-z]*)3'/ě${1}'/
    - xform/e([a-z]*)4'/è${1}'/
  
    - xform/iu1'/iū'/
    - xform/iu2'/iú'/
    - xform/iu3'/iǔ'/
    - xform/iu4'/iù'/

    - xform/i([a-z]*)1'/ī${1}'/
    - xform/i([a-z]*)2'/í${1}'/
    - xform/i([a-z]*)3'/ǐ${1}'/
    - xform/i([a-z]*)4'/ì${1}'/

    - xform/o([a-z]*)1'/ō${1}'/
    - xform/o([a-z]*)2'/ó${1}'/
    - xform/o([a-z]*)3'/ǒ${1}'/
    - xform/o([a-z]*)4'/ò${1}'/

    - xform/u([a-z]*)1'/ū${1}'/
    - xform/u([a-z]*)2'/ú${1}'/
    - xform/u([a-z]*)3'/ǔ${1}'/
    - xform/u([a-z]*)4'/ù${1}'/
                             
    - xform/ü([a-z]*)1'/ǖ${1}'/
    - xform/ü([a-z]*)2'/ǘ${1}'/
    - xform/ü([a-z]*)3'/ǚ${1}'/
    - xform/ü([a-z]*)4'/ǜ${1}'/
    
    - xform/([a-z])1'/${1}¹'/
    - xform/([a-z])2'/${1}²'/
    - xform/([a-z])3'/${1}³'/
    - xform/([a-z])4'/${1}⁴'/
    - xform/([a-z])0'/${1}⁰'/
  comment_format:
    __include: imr_config:/translator/comment_format/万象

punctuator:
  import_preset: default

key_binder:
  bindings:
    - {accept: "Control+p", send: Up, when: composing}
    - {accept: "Control+n", send: Down, when: composing}
    - {accept: "Control+b", send: Left, when: composing}
    - {accept: "Control+f", send: Right, when: composing}
    - {accept: "Control+a", send: Home, when: composing}
    - {accept: "Control+e", send: End, when: composing}
    - {accept: "Control+d", send: Delete, when: composing}
    - {accept: "Control+k", send: "Shift+Delete", when: composing}
    - {accept: "Control+h", send: BackSpace, when: composing}
    - {accept: "Control+g", send: Escape, when: composing}
    - {accept: "Control+bracketleft", send: Escape, when: composing}
    - {accept: "Alt+v", send: Page_Up, when: composing}
    - {accept: "Control+v", send: Page_Down, when: composing}
    - {accept: ISO_Left_Tab, send: "Shift+Left", when: composing}
    - {accept: "Shift+Tab", send: "Shift+Left", when: composing}
    - {accept: Tab, send: "Shift+Right", when: composing}
    - {accept: minus, send: Page_Up, when: has_menu}
    - {accept: equal, send: Page_Down, when: has_menu}
    - {accept: comma, send: Page_Up, when: paging}
    - {accept: period, send: Page_Down, when: has_menu}
    - {accept: "Control+Shift+1", select: .next, when: always}
    - {accept: "Control+Shift+2", toggle: ascii_mode, when: always}
    - {accept: "Control+Shift+3", toggle: full_shape, when: always}
    - {accept: "Control+Shift+4", toggle: simplification, when: always}
    - {accept: "Control+Shift+5", toggle: extended_charset, when: always}
    - {accept: "Control+Shift+exclam", select: .next, when: always}
    - {accept: "Control+Shift+at", toggle: ascii_mode, when: always}
    - {accept: "Control+Shift+numbersign", toggle: full_shape, when: always}
    - {accept: "Control+Shift+dollar", toggle: simplification, when: always}
    - {accept: "Control+Shift+percent", toggle: extended_charset, when: always}
    - {accept: "Control+Shift+4", toggle: zh_simp, when: always}
    - {accept: "Control+Shift+dollar", toggle: zh_simp, when: always}
    # - {accept: KP_0, send: space, when: has_menu}
    # - {accept: KP_1, send: 1, when: always}
    # - {accept: KP_2, send: 2, when: always}
    # - {accept: KP_3, send: 3, when: always}
    # - {accept: KP_4, send: 4, when: always}
    # - {accept: KP_5, send: 5, when: always}
    # - {accept: KP_6, send: 6, when: always}
    # - {accept: KP_7, send: 7, when: always}
    # - {accept: KP_8, send: 8, when: always}
    # - {accept: KP_9, send: 9, when: always}
    # - {accept: 1, send: KP_1, when: always}
    # - {accept: 2, send: KP_2, when: always}
    # - {accept: 3, send: KP_3, when: always}
    # - {accept: 4, send: KP_4, when: always}
    # - {accept: 5, send: KP_5, when: always}
    # - {accept: 6, send: KP_6, when: always}
    # - {accept: 7, send: KP_7, when: always}
    # - {accept: 8, send: KP_8, when: always}
    # - {accept: 9, send: KP_9, when: always}
    - {accept: KP_Subtract, send: BackSpace, when: has_menu}
    - {accept: KP_Divide, send: Page_Up, when: has_menu}
    - {accept: KP_Multiply, send: Page_Down, when: has_menu}
    - {accept: KP_Subtract, send: Up, when: has_menu}
    - {accept: KP_Add, send: Down, when: has_menu}
    - {accept: Left, send: Left, when: has_menu}
    - {accept: Right, send: Right, when: has_menu}
    - {accept: KP_Decimal, send: BackSpace, when: has_menu}
    - {accept: KP_Enter, send: Return, when: has_menu}
  import_preset: default
speller:
  alphabet: 1234567890abcdefghijklmnopqrstuvwxyz`'
  initials: 1234567890'
  delimiter: " 7"        # 系统配置，第一位<空格>是拼音之间的分隔符；第二位<'>表示可以手动输入单引号来分割拼音。
  algebra:
    __include: imr_config:/speller/algebra/imr_numpad_t9
# 部件拆字反查
radical_lookup:
  tag: radical_lookup
  dictionary: imr_numpad_t9_radical_pinyin
  enable_sentence: false
  enable_user_dict: false
  prefix: "77"  # 反查前缀（反查时前缀会消失影响打英文所以设定为两个字母，或可改成一个非字母符号），与 recognizer/patterns/radical_lookup 匹配
  comment_format:
    - erase/^.*$//

# 部件拆字滤镜
radical_reverse_lookup:
  tags: [ radical_lookup ]
  # dictionary 为拼音标注来源，目前是显示本方案词库的注音。
  # 可去部件拆字方案下载更全的、带声调的、已编译好的词典： https://github.com/mirtlecn/rime-radical-pinyin#反查带声调注音
  dictionary: wanxiang
  # comment_format:     # 自定义 comment，例如在左右加上括号
  #  - xform/^/(/
  #  - xform/$/)/

# weasel
# style:
#   horizontal: false  # 候选项横排：true；false
menu:
  page_size: 9  # 候选词个数
imr_numpad_t9:
  search_format:
    __include: imr_config:/speller/algebra/声调
    __append:
      - xform/<([1-4])>/$1/
      - xform/<5>/0/
      - xform/[0-4]//

# __patch:
#   imr_config:/octagram/wanxiang